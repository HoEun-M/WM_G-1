<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>고체에서 열의 이동 관찰하기</title>
<!--
========================================================================
  가상 실험실 공통 뼈대 HTML (v2)
  ========================================================================

  v2 변경 사항 (vs v1):
    + ★④ 영역에 stepSegments / summarySegments 변수 신설
    + playStepSegments(n), playSummarySegments() 함수 추가
      → 한 단계 안에서 가이드 메시지 + mp3가 순차 변경되는 케이스 지원
    + setStep(n)이 stepSegments[n]을 자동 인식하여 다중 세그먼트 재생
    + goToSummary()가 playSummarySegments()를 자동 호출

  v1 호환성: 단일 세그먼트만 사용하는 실험(stepSegments / summarySegments
    가 비어 있는 경우)은 v1과 똑같이 동작합니다. 기존 v1용 ★⑥ 코드
    (playAudio('takeN') 직접 호출 등)도 그대로 동작합니다.

  이 파일은 "고체에서 열의 이동"과 "액체에서 열의 이동" 두 완성본에서
  공통으로 사용되는 부분만 뽑아 정리한 재사용 뼈대입니다.

  ▼ 이미 준비된 영역 (건드릴 필요 없음):
    - 전체 UI 셸 (헤더, 스텝 인디케이터, 가이드 버블, 팝업, 로딩)
    - 공통 CSS (색상 테마 변수로 분리)
    - Three.js 씬 세팅 (배경, 카메라, 조명, 바닥, groundPlane)
    - 카메라 컨트롤 (마우스/터치 드래그 회전, 휠/핀치 줌, 보간)
    - 3D 장비 라이브러리 (createChromeTex, 재료 프리셋)
    - TTS + BGM 오디오 시스템 (mp3 재생 + 웹 TTS 폴백)
    - 스텝 전환 유틸 (setStep, updateGuide, updateDots)
    - 다중 세그먼트 재생 (playStepSegments, playSummarySegments)  ← v2 신규
    - 드래그 헬퍼 (screenToWorld, 고스트 클론 패턴)
    - 애니메이션 루프 + 리사이즈 핸들러
  
  ▼ 실험별로 채워 넣는 영역 — 아래 ★ 마커 8곳:
    ① 실험 메타 (제목, 색상 테마)
    ② HTML 요소 (사이드 카드 패널, 단원별 팝업 내용)
    ③ 오디오 파일 + 나레이션 매핑
    ④ 가이드 메시지 배열 + (선택) stepSegments / summarySegments
    ⑤ 실험별 3D 장비 build 함수
    ⑥ 실험별 드래그 핸들러 + 단계 전환 로직
    ⑦ ★★ 핵심 시뮬레이션 코어 (열전도/대류/용해/증발 등)
    ⑧ 리셋 로직 (실험별 상태 초기화)
  
  각 영역에는 // ★① 같은 마커와 힌트가 주석으로 들어있습니다.
  Claude Code 등으로 작업할 때 "★① 영역만 채워줘" 같은 식으로 범위 지정 가능.
-->
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

/* ================================================================
   ★① 실험별 색상 테마 (여기만 바꾸면 전체 톤 변경됨)
   ================================================================ */
:root {
  --accent: #ff6b9d;        /* 메인 강조 색상 — 버튼, 활성 dot, 그라데이션 시작점 */
  --accent2: #feca57;       /* 그라데이션 페어 색상 — 그라데이션 끝점 */
  --accent-light: #ffd9e6;  /* 완료 상태 표시용 — 완료된 dot 배경, 약한 강조 */
  --text-dark: #2d3436;
  --text-mid: #636e72;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;overflow:hidden;width:100vw;height:100vh;touch-action:none}
#canvas-container{width:100%;height:100%;position:relative}
canvas{display:block}

/* ===== 헤더 ===== */
#header{position:absolute;top:0;left:0;right:0;height:52px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;padding:0 20px;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
#header .mascot-icon{width:36px;height:36px;background:var(--accent-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;margin-right:10px}
#header .title-badge{background:rgba(255,255,255,0.25);border-radius:20px;padding:3px 14px;color:#fff;font-weight:700;font-size:14px;margin-right:14px}
#header .subtitle{color:#fff;font-size:13px;font-weight:500}
#music-btn{margin-left:auto;width:36px;height:36px;padding:0;background:rgba(0,0,0,0.35);border:2px solid rgba(255,255,255,0.7);border-radius:50%;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
#music-btn svg{width:20px;height:20px;fill:#fff}

/* ===== 스텝 인디케이터 ===== */
#step-indicator{position:absolute;top:64px;left:20px;display:flex;gap:6px;z-index:100}
.step-dot{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:rgba(255,255,255,0.5);transition:all .4s}
.step-dot.active{background:var(--accent);color:#fff;box-shadow:0 3px 10px rgba(0,184,148,0.4)}
.step-dot.completed{background:var(--accent-light);color:#fff}

/* ===== 가이드 버블 + 캐릭터 ===== */
#guide-area{position:absolute;bottom:140px;left:14px;display:flex;flex-direction:column;align-items:flex-start;z-index:100;pointer-events:none}
#guide-bubble{background:#fff;border-radius:18px;padding:12px 20px;font-size:13.5px;font-weight:500;color:var(--text-dark);box-shadow:0 5px 20px rgba(0,0,0,0.18);max-width:380px;line-height:1.6;transition:opacity .35s;opacity:1;position:relative;white-space:pre-line}
#guide-bubble::after{content:'';position:absolute;bottom:-10px;left:36px;border-left:10px solid transparent;border-right:10px solid transparent;border-top:10px solid #fff}
#character-wrap{margin-left:12px;margin-top:2px}
#character-svg{width:60px;height:60px}

/* ===== 사이드 카드 패널 (실험별 선택지) ===== */
#side-panel{position:absolute;right:16px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:12px;z-index:100}
.side-card{width:118px;background:rgba(255,255,255,0.96);border-radius:14px;padding:10px;text-align:center;cursor:grab;transition:all .25s;box-shadow:0 3px 14px rgba(0,0,0,0.14);user-select:none}
.side-card:hover{transform:scale(1.05);box-shadow:0 6px 24px rgba(0,0,0,0.22)}
.side-card .preview{width:94px;height:60px;margin:0 auto 5px;display:flex;align-items:center;justify-content:center}
.side-card .label{font-size:11px;font-weight:700;color:var(--text-dark)}

/* ===== 드롭 존 인디케이터 ===== */
#drop-zone-indicator{position:absolute;pointer-events:none;z-index:50;border:3px dashed rgba(150,150,150,0.55);border-radius:16px;transition:border-color .3s;display:none}
#drop-zone-indicator.highlight{border-color:var(--accent);box-shadow:0 0 18px rgba(0,184,148,0.35)}

/* ===== 속도 조절 바 ===== */
#speed-bar{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:none;align-items:center;gap:6px;background:rgba(255,255,255,0.96);border-radius:14px;padding:8px 14px;z-index:100;box-shadow:0 3px 14px rgba(0,0,0,0.14);white-space:nowrap}
.speed-label{font-size:12px;font-weight:700;color:var(--text-mid);margin-right:2px}
.speed-btn{padding:5px 11px;border:2px solid #ddd;border-radius:8px;background:#fff;font-size:13px;font-weight:700;cursor:pointer;color:var(--text-mid);font-family:inherit;transition:all .2s}
.speed-btn:hover{border-color:var(--accent);color:var(--accent)}
.speed-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ===== 하단 버튼들 ===== */
#next-btn{position:absolute;bottom:20px;right:20px;padding:12px 28px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;z-index:100;box-shadow:0 4px 18px rgba(0,184,148,0.4);display:none;transition:transform .2s}
#next-btn:hover{transform:translateY(-2px)}
#reset-btn{position:absolute;bottom:20px;left:18px;width:44px;height:44px;background:#222;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:100;color:#fff;font-size:20px;box-shadow:0 3px 12px rgba(0,0,0,0.4);transition:all .3s}
#reset-btn:hover{background:#000;transform:rotate(-180deg)}

/* ===== 탐구 목표 팝업 ===== */
#objective-popup{position:absolute;inset:0;background:rgba(0,0,0,0.45);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:250;cursor:pointer}
#objective-card{background:#fff;border-radius:20px;padding:36px 40px;max-width:440px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,0.25);animation:popIn .5s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
#objective-card h3{font-size:17px;color:#1a5276;margin-bottom:12px;font-weight:700}
#objective-card p{font-size:15.5px;color:var(--text-dark);line-height:1.75;font-weight:500}
#objective-card .hint{margin-top:16px;font-size:12px;color:#aaa;font-weight:400}

/* ===== 결과 요약 오버레이 ===== */
#summary-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:200}
#summary-card{background:#fff;border-radius:22px;padding:42px;max-width:520px;text-align:center;box-shadow:0 16px 50px rgba(0,0,0,0.3);animation:popIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
#summary-card h2{font-size:22px;color:#1a5276;margin-bottom:6px}
#summary-card p{font-size:16px;color:var(--text-dark);line-height:1.8;margin-bottom:20px}
#summary-card .highlight{background:#f0f0f0;color:var(--text-dark);padding:14px 20px;border-radius:14px;font-size:15px;font-weight:700;line-height:1.6;border:1px solid #ddd}
#summary-card button{margin-top:20px;padding:11px 28px;background:#1a5276;color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}

/* ===== 로딩 ===== */
#loading{position:absolute;inset:0;background:#c8d6dc;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;transition:opacity .5s}
.spinner{width:44px;height:44px;border:4px solid rgba(0,184,148,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}
#loading p{color:#555;margin-top:14px;font-weight:500}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>가상 실험실을 준비하고 있어요...</p></div>

<!-- ★② 탐구 목표 팝업: 실험 주제에 맞춰 문구 수정 -->
<div id="objective-popup">
  <div id="objective-card">
    <h3>탐구 목표</h3>
    <p>고체에서 열의 이동을 관찰하고 열이 어떻게 이동하는지 설명할 수 있다.</p>
    <div class="hint">화면을 탭하면 계속됩니다</div>
  </div>
</div>

<div id="canvas-container">

  <!-- 헤더 -->
  <div id="header">
    <div class="mascot-icon">🔬</div>
    <div class="title-badge">가상 실험실</div>
    <!-- ★② 서브타이틀: 실험 제목으로 교체 -->
    <div class="subtitle">고체에서 열의 이동 관찰하기</div>
    <button id="music-btn" onclick="toggleBgMusic()">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v1.16l3.48 3.48c.26-.65.42-1.35.42-2.09h-.01l.01-.04z" opacity="0.3"/><line x1="18" y1="6" x2="6" y2="18" stroke="#fff" stroke-width="2"/></svg>
    </button>
  </div>

  <!-- 스텝 인디케이터: ★② 실험 단계 수에 맞춰 dot 개수 조정 -->
  <div id="step-indicator">
    <div class="step-dot active" id="dot-1">1</div>
    <div class="step-dot" id="dot-2">2</div>
    <div class="step-dot" id="dot-3">3</div>
  </div>

  <!-- 가이드 버블 + 캐릭터 -->
  <div id="guide-area">
    <div id="guide-bubble"><!-- 초기 메시지는 JS에서 설정됨 --></div>
    <div id="character-wrap">
      <svg id="character-svg" viewBox="0 0 100 110">
        <ellipse cx="50" cy="62" rx="30" ry="26" fill="#6BCB77"/>
        <ellipse cx="37" cy="52" rx="9" ry="10" fill="#fff"/>
        <ellipse cx="63" cy="52" rx="9" ry="10" fill="#fff"/>
        <circle cx="39" cy="53" r="5" fill="#2d3436"/>
        <circle cx="65" cy="53" r="5" fill="#2d3436"/>
        <circle cx="41" cy="51" r="2" fill="#fff"/>
        <circle cx="67" cy="51" r="2" fill="#fff"/>
        <path d="M43,68 Q50,76 57,68" stroke="#2d3436" stroke-width="2" fill="none" stroke-linecap="round"/>
        <ellipse cx="22" cy="65" rx="7" ry="4.5" fill="#6BCB77"/>
        <ellipse cx="78" cy="60" rx="7" ry="4.5" fill="#6BCB77" transform="rotate(-15 78 60)"/>
        <rect x="37" y="86" width="9" height="7" rx="3" fill="#FF8C00"/>
        <rect x="54" y="86" width="9" height="7" rx="3" fill="#FF8C00"/>
        <circle cx="50" cy="34" r="4.5" fill="#FFD93D"/>
      </svg>
    </div>
  </div>

  <!-- ★② 사이드 카드 패널: 실험별 선택지를 여기에 넣으세요 -->
  <!--
    예) 고체: 구리판 3종 / 액체: 비커+잉크 도구 등
    각 카드에 data-* 속성을 달아서 setupCardDrag()에서 식별 가능.
    카드의 .preview 안에는 작은 SVG 미리보기를 넣으면 자연스러움.
  -->
  <div id="side-panel">
    <!-- Step 1: 구리판 3종 (길게 자른/정사각형/ㄷ모양) — 윗면에 분홍색 열변색 붙임딱지 -->
    <div class="side-card panel-step1" data-type="copper-long">
      <div class="preview">
        <svg viewBox="0 0 94 60">
          <!-- 길게 자른 구리판 (옆에서 본 모습 + 윗면) -->
          <ellipse cx="47" cy="48" rx="36" ry="3" fill="rgba(0,0,0,0.15)"/>
          <rect x="11" y="34" width="72" height="6" fill="#b87333" stroke="#8a4f1d" stroke-width="0.5"/>
          <rect x="11" y="30" width="72" height="4" fill="#ff9ec4" stroke="#e87aa8" stroke-width="0.5"/>
        </svg>
      </div>
      <div class="label">길게 자른<br>구리판</div>
    </div>
    <div class="side-card panel-step1" data-type="copper-square">
      <div class="preview">
        <svg viewBox="0 0 94 60">
          <ellipse cx="47" cy="50" rx="22" ry="3" fill="rgba(0,0,0,0.15)"/>
          <rect x="25" y="30" width="44" height="14" fill="#b87333" stroke="#8a4f1d" stroke-width="0.5"/>
          <rect x="25" y="22" width="44" height="8" fill="#ff9ec4" stroke="#e87aa8" stroke-width="0.5"/>
        </svg>
      </div>
      <div class="label">정사각형<br>구리판</div>
    </div>
    <div class="side-card panel-step1" data-type="copper-c">
      <div class="preview">
        <svg viewBox="0 0 94 60">
          <ellipse cx="47" cy="50" rx="26" ry="3" fill="rgba(0,0,0,0.15)"/>
          <!-- ㄷ 모양: 좌측 세로 + 상단 가로 + 하단 가로 -->
          <path d="M 22 18 L 22 44 L 32 44 L 32 26 L 62 26 L 62 44 L 72 44 L 72 18 Z"
                fill="#ff9ec4" stroke="#e87aa8" stroke-width="0.5"/>
          <path d="M 22 44 L 22 48 L 72 48 L 72 44 Z" fill="#b87333" stroke="#8a4f1d" stroke-width="0.5"/>
        </svg>
      </div>
      <div class="label">ㄷ모양<br>구리판</div>
    </div>

    <!-- Step 2: 초 (삼발이+쇠그물+초 통합 카드) — 기본 숨김 -->
    <div class="side-card panel-step2" data-type="candle" style="display:none">
      <div class="preview">
        <svg viewBox="0 0 94 60">
          <!-- 삼발이 다리 -->
          <line x1="20" y1="48" x2="32" y2="32" stroke="#999" stroke-width="2" stroke-linecap="round"/>
          <line x1="74" y1="48" x2="62" y2="32" stroke="#999" stroke-width="2" stroke-linecap="round"/>
          <line x1="47" y1="48" x2="47" y2="32" stroke="#999" stroke-width="2" stroke-linecap="round"/>
          <!-- 삼발이 링 -->
          <ellipse cx="47" cy="32" rx="18" ry="4" fill="none" stroke="#888" stroke-width="2"/>
          <!-- 쇠그물 -->
          <rect x="28" y="28" width="38" height="3" fill="#aaa" stroke="#666" stroke-width="0.5"/>
          <!-- 초 (티라이트) -->
          <rect x="36" y="22" width="22" height="6" rx="1" fill="#f0ece0" stroke="#c0b890" stroke-width="0.5"/>
          <!-- 심지 + 불꽃 -->
          <line x1="47" y1="22" x2="47" y2="18" stroke="#333" stroke-width="1"/>
          <ellipse cx="47" cy="14" rx="2.5" ry="5" fill="#fdcb6e"/>
          <ellipse cx="47" cy="15" rx="1.2" ry="3" fill="#fff8ee"/>
        </svg>
      </div>
      <div class="label">초<br>(삼발이+쇠그물)</div>
    </div>

    <!-- Step 3: 다시 하기 버튼 + 안내 텍스트 — 기본 숨김 -->
    <div class="panel-step3" id="panel-step3" style="display:none;width:140px;background:rgba(255,255,255,0.96);border-radius:14px;padding:14px 12px;text-align:center;box-shadow:0 3px 14px rgba(0,0,0,0.14)">
      <div style="font-size:12px;font-weight:500;color:#636e72;line-height:1.55;margin-bottom:10px">
        열 변색 붙임딱지의<br>색깔이 변하는 모습을<br>관찰해 보세요.
      </div>
      <button id="restart-btn" onclick="resetExperiment()"
              style="padding:8px 14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;width:100%">
        ↺ 다시 하기
      </button>
    </div>
  </div>

  <!-- 드롭 존 (2D 오버레이용) -->
  <div id="drop-zone-indicator"></div>

  <!-- 속도 조절 바 (시뮬레이션 중 표시) -->
  <div id="speed-bar">
    <span class="speed-label">속도</span>
    <button class="speed-btn" onclick="setSpeed(0.5)">x0.5</button>

var guideMessages = [

// 단계가 단일 세그먼트면 stepSegments에 항목을 두지 마세요. 기존 방식

var stepSegments = {
  2: [
    { guide: '열 변색 붙임딱지의 색깔 변화를 관찰해 보세요.', audioKey: 'take4_1', delayMs: 0 },

function updateGuide(text) {

}
function updateGuideByStep(n) {

/* ── 다중 세그먼트 순차 재생 (v2) ──

   세그먼트를 하나씩 재생(가이드 갱신 → 오디오 재생 → 종료 대기 → delayMs 대기 → 다음).

var segmentChainToken = 0;
function playStepSegments(n) {
  segmentChainToken++;          // 새 체인 시작 → 이전 체인 무효화
  var myToken = segmentChainToken;
  var segs = stepSegments[n];
  if (!segs || !segs.length) {

    updateGuideByStep(n);
    playAudio('take' + (n + 2));
    return;

  // 다중 세그먼트 체인
  function playSeg(idx) {
    if (myToken !== segmentChainToken) return;   // 다른 체인이 시작되면 중단
    if (idx >= segs.length) return;
    var seg = segs[idx];
    if (seg.guide) updateGuide(seg.guide);
    playAudio(seg.audioKey, function onEnd() {
      if (myToken !== segmentChainToken) return;
      var nextIdx = idx + 1;
      if (nextIdx >= segs.length) return;
      var delay = segs[nextIdx].delayMs || 0;
      setTimeout(function () { playSeg(nextIdx); }, delay);
    });
  }
  playSeg(0);
}

function playSummarySegments() {
  segmentChainToken++;
  var myToken = segmentChainToken;
  var segs = summarySegments;
  if (!segs || !segs.length) {
    // 단일 mp3 폴백
    playAudio('summary');
    return;
  }
  function playSeg(idx) {
    if (myToken !== segmentChainToken) return;
    if (idx >= segs.length) return;
    var seg = segs[idx];
    playAudio(seg.audioKey, function onEnd() {
      if (myToken !== segmentChainToken) return;
      var nextIdx = idx + 1;
      if (nextIdx >= segs.length) return;
      var delay = segs[nextIdx].delayMs || 0;
      setTimeout(function () { playSeg(nextIdx); }, delay);
    });
  }
  playSeg(0);
}

  for (var i = 0; i < dots.length; i++) {

    if (i === currentStep) d.classList.add('active');

/* setStep(n, autoPlay)
   n: Step 인덱스 (0부터)
   autoPlay (선택, 기본 false): 단일 세그먼트일 때 takeN+2 mp3까지 자동 재생할지 여부

   ▸ stepSegments[n]에 항목이 있으면: 항상 다중 세그먼트 체인 자동 재생 (autoPlay 무시)
   ▸ stepSegments[n]이 없을 때:
       - autoPlay = false (기본): 가이드만 갱신. mp3는 ★⑥의 단계 전환 코드에서
         별도로 playAudio('take' + (n+2))를 호출해야 함 (v1 호환 동작)
       - autoPlay = true: 가이드 갱신 + playAudio('take' + (n+2)) 자동 호출

function setStep(n, autoPlay) {
  currentStep = n;

  if (stepSegments[n] && stepSegments[n].length > 0) {
    playStepSegments(n);
  } else {
    updateGuideByStep(n);
    if (autoPlay) playAudio('take' + (n + 2));
  }
}

  cv.addEventListener('wheel', function (e) {
    e.preventDefault();
    targetZoom = Math.max(2.5, Math.min(10, targetZoom + e.deltaY * 0.004));
  }, { passive: false });

  var ts = null, td = null;
  cv.addEventListener('touchstart', function (e) {
    if (e.touches.length === 1) ts = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    else if (e.touches.length === 2)
      td = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  });
  cv.addEventListener('touchmove', function (e) {
    e.preventDefault();
    if (e.touches.length === 1 && ts) {
      targetRot.y -= (e.touches[0].clientX - ts.x) * 0.005;
      targetRot.x = Math.max(-0.2, Math.min(0.9, targetRot.x + (e.touches[0].clientY - ts.y) * 0.005));
      ts = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    } else if (e.touches.length === 2 && td) {
      var nd = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      targetZoom = Math.max(2.5, Math.min(10, targetZoom - (nd - td) * 0.015));
      td = nd;
    }
  }, { passive: false });
  cv.addEventListener('touchend', function () { ts = null; td = null; });

  window.addEventListener('resize', function () {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

/* ========================================================================
   드래그 헬퍼 (공통) — 2D UI → 3D 좌표 변환, 고스트 클론
   ======================================================================== */
function screenToWorld(sx, sy) {
  var r = renderer.domElement.getBoundingClientRect();
  var nx = ((sx - r.left) / r.width) * 2 - 1;
  var ny = -((sy - r.top) / r.height) * 2 + 1;
  raycaster.setFromCamera(new THREE.Vector2(nx, ny), camera);
  var hits = raycaster.intersectObject(groundPlane);
  if (hits.length > 0) return { x: hits[0].point.x, z: hits[0].point.z };
  return null;
}
function worldToScreen(wx, wy, wz) {
  var p = new THREE.Vector3(wx, wy || 0, wz || 0).project(camera);
  return { x: (p.x * 0.5 + 0.5) * window.innerWidth, y: (-p.y * 0.5 + 0.5) * window.innerHeight };
}
// 사이드 카드를 드래그할 때 화면에 따라다니는 고스트 요소 생성
function makeGhost(el, startX, startY) {
  var r = el.getBoundingClientRect();
  var g = el.cloneNode(true);
  g.style.cssText = 'position:fixed;pointer-events:none;z-index:9999;opacity:0.85;width:' + r.width + 'px;';
  document.body.appendChild(g);
  g._ox = startX - r.left; g._oy = startY - r.top;
  moveGhost(g, startX, startY);
  return g;
}
function moveGhost(g, x, y) {
  g.style.left = (x - g._ox) + 'px';
  g.style.top = (y - g._oy) + 'px';
}

/* ========================================================================
   애니메이션 루프 (공통)
   - 카메라 보간은 항상 돌아감
   - 시뮬레이션 업데이트는 updateSimulation() 훅에서 처리
   ======================================================================== */
function animate() {
  requestAnimationFrame(animate);

  // 카메라 보간
  curRot.x += (targetRot.x - curRot.x) * 0.05;
  curRot.y += (targetRot.y - curRot.y) * 0.05;
  curZoom += (targetZoom - curZoom) * 0.05;
  camera.position.x = Math.sin(curRot.y) * Math.cos(curRot.x) * curZoom;
  camera.position.y = Math.sin(curRot.x) * curZoom + 1.0;
  camera.position.z = Math.cos(curRot.y) * Math.cos(curRot.x) * curZoom;
  camera.lookAt(0, 1.0, 0);

  // ★⑦ 실험별 프레임 업데이트 (정의되어 있으면 호출)
  if (typeof updateSimulation === 'function') updateSimulation();
  if (typeof updateFlame === 'function') updateFlame();  // 촛불 애니메이션 등

  renderer.render(scene, camera);
}

/* ───── 쇠그물 (석면 대용 철망) ───── */
function buildWireGauze(parentGroup, gauzeY) {
  var gauzeSize = 0.225;  // 정사각형 한 변의 절반 (전체 변 길이 0.45)

  // — 외곽 프레임 —
  var frameMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.3, metalness: 0.8 });
  var frameT = 0.018;
  var frameH = 0.008;
  parentGroup.add(M(new THREE.BoxGeometry(gauzeSize * 2, frameH, frameT), frameMat,
    0, gauzeY + frameH / 2, -gauzeSize + frameT / 2));
  parentGroup.add(M(new THREE.BoxGeometry(gauzeSize * 2, frameH, frameT), frameMat,
    0, gauzeY + frameH / 2, gauzeSize - frameT / 2));
  parentGroup.add(M(new THREE.BoxGeometry(frameT, frameH, gauzeSize * 2), frameMat,
    -gauzeSize + frameT / 2, gauzeY + frameH / 2, 0));
  parentGroup.add(M(new THREE.BoxGeometry(frameT, frameH, gauzeSize * 2), frameMat,
    gauzeSize - frameT / 2, gauzeY + frameH / 2, 0));

  // — 철망 격자 —
  var wireMat = new THREE.MeshBasicMaterial({ color: 0x666666 });
  var wireCount = 20;
  var innerSize = gauzeSize - frameT;
  var wireSpacing = (innerSize * 2) / (wireCount + 1);
  var wireThick = 0.0025;

  for (var wi = 1; wi <= wireCount; wi++) {
    var offset = -innerSize + wi * wireSpacing;
    var hw = new THREE.Mesh(
      new THREE.BoxGeometry(innerSize * 2, 0.002, wireThick), wireMat);
    hw.position.set(0, gauzeY + 0.003, offset);
    parentGroup.add(hw);
    var vw = new THREE.Mesh(
      new THREE.BoxGeometry(wireThick, 0.002, innerSize * 2), wireMat);
    vw.position.set(offset, gauzeY + 0.003, 0);
    parentGroup.add(vw);
  }

  // — 세라믹 패드 —
  var ceramicR = gauzeSize * 0.58;
  var ceramicMat = new THREE.MeshStandardMaterial({
    color: 0xe8e0d4, roughness: 0.85, metalness: 0.0
  });
  var ceramic = new THREE.Mesh(new THREE.CircleGeometry(ceramicR, 32), ceramicMat);
  ceramic.rotation.x = -Math.PI / 2;
  ceramic.position.y = gauzeY + 0.005;
  parentGroup.add(ceramic);

  // 그을음
  var sootMat = new THREE.MeshBasicMaterial({
    color: 0x888877, transparent: true, opacity: 0.18
  });
  var soot = new THREE.Mesh(new THREE.CircleGeometry(ceramicR * 0.55, 20), sootMat);
  soot.rotation.x = -Math.PI / 2;
  soot.position.y = gauzeY + 0.006;
  parentGroup.add(soot);
}

/* ───── 삼발이+쇠그물+초 (통합) ───── */
function buildCandleAssembly(wx, wz) {
  var group = new THREE.Group();
  var lm = new THREE.MeshStandardMaterial({ color: 0xc8c8c8, roughness: 0.2, metalness: 0.9 });
  var ringR = 0.19, ringY = 0.63;
  group.add(function(){ var r = new THREE.Mesh(new THREE.TorusGeometry(ringR, 0.010, 8, 36), lm);
    r.position.y = ringY; r.rotation.x = Math.PI / 2; return r; }());
  for (var li = 0; li < 3; li++) {
    var ang = li * 2 * Math.PI / 3, sa = Math.sin(ang), ca = Math.cos(ang);
    var tx = ringR * sa, tz = ringR * ca, bx = 0.28 * sa, bz = 0.28 * ca;
    var dx = bx - tx, dy = -ringY, dz = bz - tz;
    var al = Math.sqrt(dx * dx + dy * dy + dz * dz);
    var arm = new THREE.Mesh(new THREE.CylinderGeometry(0.011, 0.013, al, 8), lm);
    arm.position.set((tx + bx) / 2, ringY / 2, (tz + bz) / 2);
    var aq = new THREE.Quaternion();
    aq.setFromUnitVectors(new THREE.Vector3(0, 1, 0), new THREE.Vector3(dx, dy, dz).normalize());
    arm.setRotationFromQuaternion(aq); arm.castShadow = true; group.add(arm);
    group.add(M(new THREE.CylinderGeometry(0.014, 0.014, 0.02, 8), lm, bx, 0.012, bz));
  }
  buildWireGauze(group, ringY + 0.016);

  // 초 (티라이트 — 납작하고 넓은 형태)
  var waxMat = new THREE.MeshStandardMaterial({ color: 0xf0ece0, roughness: 0.65, transparent: true, opacity: 0.88 });
  var wax = new THREE.Mesh(new THREE.CylinderGeometry(0.090, 0.090, 0.036, 18), waxMat);
  wax.position.y = ringY + 0.036; wax.castShadow = true; group.add(wax);
  group.add(M(new THREE.CylinderGeometry(0.003, 0.003, 0.022, 4),
    new THREE.MeshBasicMaterial({ color: 0x444444 }), 0, ringY + 0.066, 0));
  group.add(M(new THREE.CylinderGeometry(0.003, 0.002, 0.008, 4),
    new THREE.MeshBasicMaterial({ color: 0x333333 }), 0, ringY + 0.081, 0));

  // 불꽃 (외부 + 내부 + PointLight)
  var fg = new THREE.SphereGeometry(0.035, 10, 14); fg.scale(1, 2.4, 1);
  var fm = new THREE.Mesh(fg, new THREE.MeshBasicMaterial({ color: 0xfdcb6e, transparent: true, opacity: 0.9 }));
  fm.position.y = ringY + 0.112; fm.name = "flame"; group.add(fm);
  var ig = new THREE.SphereGeometry(0.018, 8, 10); ig.scale(1, 2.0, 1);
  var im = new THREE.Mesh(ig, new THREE.MeshBasicMaterial({ color: 0xfff8ee, transparent: true, opacity: 0.95 }));
  im.position.y = ringY + 0.122; im.name = "flameInner"; group.add(im);
  var fl = new THREE.PointLight(0xff9500, 1.6, 4); fl.position.y = ringY + 0.112; fl.name = "flameLight"; group.add(fl);

  group.scale.set(1.4156, 1.4156, 1.4156);
  group.position.set(wx, 0.02, wz);
  return group;
}


/* ========================================================================
   ★⑥ 실험별 인터랙션 (드래그 → 단계 전환)
   ========================================================================
   사이드 카드를 드래그해서 특정 위치에 드롭하면 단계가 진행되는 패턴.
   아래 setupCardDrag는 "카드 드래그 → 드롭 지점 검증 → 콜백" 골격을
   공통으로 제공합니다. 실험별로는 드롭 조건과 콜백만 정의하면 됩니다.
   
   사용법:
     setupCardDrag({
       selector: '.side-card',                  // 드래그할 카드 셀렉터
       onDrop: function(cardEl, screenX, screenY) {
         // 드롭 위치가 유효하면 다음 단계로 진행
         // 예: 스크린 좌표를 월드 좌표로 변환 후 판정
         var world = screenToWorld(screenX, screenY);
         if (world && isValidDropZone(world)) {
           proceedToNextStep(cardEl.dataset.type, world);
         }
       }
     });
*/
function setupCardDrag(opts) {
  var cards = document.querySelectorAll(opts.selector);
  for (var i = 0; i < cards.length; i++) (function (el) {
    function start(e, getXY) {
      if (opts.enabledIf && !opts.enabledIf()) return;
      e.preventDefault();
      isDraggingCard = true;
      var xy = getXY(e);
      var ghost = makeGhost(el, xy.x, xy.y);
      var moved = false, sx = xy.x, sy = xy.y;

      function onMove(ev) {
        var p = getXY(ev);
        if (ev.preventDefault) { try { ev.preventDefault(); } catch (e2) {} }
        moveGhost(ghost, p.x, p.y);
        if (Math.hypot(p.x - sx, p.y - sy) > 5) moved = true;
        if (opts.onMove) opts.onMove(el, p.x, p.y);
      }
      function onEnd(ev) {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onEnd);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onEnd);
        isDraggingCard = false; ghost.remove();
        var p = ev.changedTouches ? { x: ev.changedTouches[0].clientX, y: ev.changedTouches[0].clientY }
                                  : { x: ev.clientX, y: ev.clientY };
        if (moved && opts.onDrop) opts.onDrop(el, p.x, p.y);
        if (opts.onEnd) opts.onEnd(el);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onEnd);
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('touchend', onEnd);
    }

    el.addEventListener('mousedown', function (e) {
      start(e, function (ev) { return { x: ev.clientX, y: ev.clientY }; });
    });
    el.addEventListener('touchstart', function (e) {
      start(e, function (ev) {
        var t = ev.touches ? ev.touches[0] : ev.changedTouches[0];
        return { x: t.clientX, y: t.clientY };
      });
    }, { passive: false });
  })(cards[i]);
}

/* ========================================================================
   ★⑦ 시뮬레이션 코어 — 실험의 "본체"가 여기에 들어갑니다
   ========================================================================
   이 영역은 실험 종류에 따라 완전히 새로 작성되는 부분입니다.
   지시서의 "시뮬레이션 설계" 탭 내용을 바탕으로 구현하세요.
   
   요구 인터페이스:
   
   1) startSimulation(opts)   — 시뮬레이션 시작 (조건이 갖춰졌을 때 호출)
   2) updateSimulation()      — animate 루프에서 매 프레임 호출됨
   3) resetSimulation()       — 상태 초기화 (resetExperiment에서 호출)
   
   패턴 카탈로그:
     • 색상 확산형: vertexColors + 거리/시간 기반 heat 계산 (열전도)
     • 파티클 순환형: InstancedMesh + 속도장/경로 업데이트 (대류)
     • 객체 변형형: scale/morph 애니메이션 (융해, 응결)
     • 스폰/소멸형: 파티클 생성·감쇠 (증발, 용해)
     • 벡터장형: 힘 적용 + 물리 적분 (자석, 중력)
   
   패턴마다 구현이 크게 달라지므로 여기선 뼈대만 제공합니다.
*/

var isSimulating = false;
var simStartTime = null;

/* ───── 실험 상태 변수 ───── */
var selectedCopperType = null;   // 'copper-long' | 'copper-square' | 'copper-c'
var copperPlate = null;          // THREE.Mesh - 클램프 끝에 고정된 구리판
var copperGreenZone = null;      // THREE.Mesh - 책상 바닥의 초록색 드롭존 (구리판 그림자)
var candleAssembly = null;       // 삼발이+쇠그물+초 통합 그룹
var heatSourceWorldPos = null;   // 초 불꽃 월드 좌표 (xz)
var heatStartTime = null;        // 가열 시작 시각

// 열 변색 붙임딱지(스티커) 정점/색상 데이터 — 같은 메쉬의 vertexColors를 시간으로 갱신
var stickerVertexData = null;    // { positions: Vector2 배열(로컬 xz), colors: BufferAttribute, geometry, mesh }

// 구리판 두께 (1mm = 0.001m, 시각적 표현용)
var COPPER_THICKNESS = 0.001;
// 구리판 윗면 y(클램프 기준), 클램프 끝 월드 좌표 = (-0.55, 1.35, 0)
// 구리판은 클램프 끝에 고정되어 클램프 끝에서 +x 방향(스탠드 반대편)으로 뻗어 나감

/* ───── 구리판 모양별 평면 좌표 (로컬, 클램프 끝 = 원점) ─────
   X+ 방향: 스탠드에서 멀어지는 방향 (학생이 보기에 우측)
   z 0을 중심으로 좌우 대칭
   각 모양은 형태 정의 + 점 포함 판정 함수 + 정점 생성기 제공 */
var COPPER_SHAPES = {
  'copper-long': {
    // 길게 자른: 좁고 긴 직사각형 (가로 2.6m, 세로 0.18m)
    // 클램프 끝(x=0)에서 시작해 +x 방향으로 뻗음
    width: 2.6, depth: 0.18,
    contains: function(lx, lz) {
      return lx >= 0 && lx <= 2.6 && lz >= -0.09 && lz <= 0.09;
    },
    // 색깔 변화 시 거리 계산 기준점이 되는 셀 그리드 생성
    makeGrid: function() {
      var pts = [];
      var nx = 80, nz = 6;
      for (var i = 0; i <= nx; i++) for (var j = 0; j <= nz; j++) {
        var lx = (i / nx) * 2.6;
        var lz = -0.09 + (j / nz) * 0.18;
        pts.push({ x: lx, z: lz });
      }
      return { points: pts, nx: nx, nz: nz };
    }
  },
  'copper-square': {
    // 정사각형: 0.9 x 0.9
    width: 0.9, depth: 0.9,
    contains: function(lx, lz) {
      return lx >= 0 && lx <= 0.9 && lz >= -0.45 && lz <= 0.45;
    },
    makeGrid: function() {
      var pts = [];
      var nx = 36, nz = 36;
      for (var i = 0; i <= nx; i++) for (var j = 0; j <= nz; j++) {
        var lx = (i / nx) * 0.9;
        var lz = -0.45 + (j / nz) * 0.9;
        pts.push({ x: lx, z: lz });
      }
      return { points: pts, nx: nx, nz: nz };
    }
  },
  'copper-c': {
    // ㄷ 모양: 외형 1.4 x 1.0, 안쪽 절개 0.9 x 0.6 (좌측 변이 막힘)
    // 외곽: x ∈ [0, 1.4], z ∈ [-0.5, 0.5]
    // 안쪽 절개(빈 공간): x ∈ [0.5, 1.4], z ∈ [-0.3, 0.3]
    // → ㄷ 자가 아래(클램프 쪽)를 향해 열린 구조가 아니라, 좌측이 막혀 있고
    //   우측이 뚫려 ㄷ 모양 (실제 교과서 도식과 동일)
    width: 1.4, depth: 1.0,
    contains: function(lx, lz) {
      var inOuter = (lx >= 0 && lx <= 1.4 && lz >= -0.5 && lz <= 0.5);
      if (!inOuter) return false;
      var inHole = (lx >= 0.5 && lx <= 1.4 && lz >= -0.3 && lz <= 0.3);
      return !inHole;
    },
    makeGrid: function() {
      var pts = [];
      var nx = 56, nz = 40;
      for (var i = 0; i <= nx; i++) for (var j = 0; j <= nz; j++) {
        var lx = (i / nx) * 1.4;
        var lz = -0.5 + (j / nz) * 1.0;
        if (this.contains(lx, lz)) pts.push({ x: lx, z: lz });
      }
      return { points: pts, nx: nx, nz: nz };
    }
  }
};

/* ───── 구리판 위치 결정 ─────
   클램프 끝 월드 좌표 = (-0.55, 1.35, 0).
   구리판은 클램프 끝(좌측 끝)에서 +x 방향으로 뻗는다.
   구리판 윗면 y = 1.35 (클램프 정중앙 높이) — 두께 1mm는 윗/아래로 0.0005씩
   하지만 여기서는 가시성을 위해 두께 = 0.001 (1mm).
   ㄷ 모양/길게 자른 구리판도 모두 클램프 끝 = 로컬 (0, 0) 기준. */
var COPPER_LOCAL_ORIGIN_WORLD = { x: -0.55, y: 1.35, z: 0 };

/* ───── 구리판 메쉬 생성 ─────
   윗면에 분홍색 열변색 스티커 (vertexColors로 색상 변화 처리)
   두께 1mm 표현 */
function buildCopperPlate(typeKey) {
  var shape = COPPER_SHAPES[typeKey];
  if (!shape) return null;

  var group = new THREE.Group();

  // 1) 구리판 본체 (밑면 + 옆면, 분홍 스티커가 아닌 구리색)
  // ㄷ 모양은 ExtrudeGeometry로, 길게/정사각형은 BoxGeometry로 처리
  var copperMat = new THREE.MeshStandardMaterial({
    color: 0xb87333, roughness: 0.45, metalness: 0.75
  });

  if (typeKey === 'copper-c') {
    // ㄷ 모양: ExtrudeGeometry 사용
    var sh = new THREE.Shape();
    sh.moveTo(0, -0.5);
    sh.lineTo(1.4, -0.5);
    sh.lineTo(1.4, -0.3);
    sh.lineTo(0.5, -0.3);
    sh.lineTo(0.5, 0.3);
    sh.lineTo(1.4, 0.3);
    sh.lineTo(1.4, 0.5);
    sh.lineTo(0, 0.5);
    sh.closePath();
    var extrudeOpts = { depth: COPPER_THICKNESS, bevelEnabled: false };
    var bodyGeo = new THREE.ExtrudeGeometry(sh, extrudeOpts);
    // ExtrudeGeometry는 xy 평면에 만들어지므로 xz 평면으로 회전
    bodyGeo.rotateX(-Math.PI / 2);
    var bodyMesh = new THREE.Mesh(bodyGeo, copperMat);
    bodyMesh.position.y = -COPPER_THICKNESS / 2;
    bodyMesh.castShadow = true; bodyMesh.receiveShadow = true;
    group.add(bodyMesh);
  } else {
    // 길게/정사각형: BoxGeometry
    var bodyGeo2 = new THREE.BoxGeometry(shape.width, COPPER_THICKNESS, shape.depth);
    var bodyMesh2 = new THREE.Mesh(bodyGeo2, copperMat);
    // 클램프 끝(x=0)에서 +x로 뻗으므로 중심은 width/2
    bodyMesh2.position.set(shape.width / 2, 0, 0);
    bodyMesh2.castShadow = true; bodyMesh2.receiveShadow = true;
    group.add(bodyMesh2);
  }

  // 2) 윗면 분홍색 열변색 스티커 (vertexColors로 색상 변화 처리)
  var stickerInfo = createStickerMesh(typeKey, shape);
  group.add(stickerInfo.mesh);

  // 그룹 자체를 클램프 끝 월드 좌표로 배치
  group.position.set(COPPER_LOCAL_ORIGIN_WORLD.x, COPPER_LOCAL_ORIGIN_WORLD.y, COPPER_LOCAL_ORIGIN_WORLD.z);

  // 스티커 정점 데이터를 구리판 그룹과 연결 (시뮬레이션에서 사용)
  stickerVertexData = stickerInfo;
  stickerVertexData.groupOriginWorld = { x: COPPER_LOCAL_ORIGIN_WORLD.x, z: COPPER_LOCAL_ORIGIN_WORLD.z };

  return group;
}

/* ───── 열변색 스티커 메쉬 (vertexColors) ─────
   윗면을 격자로 잘게 쪼개서 각 정점에 색상을 부여,
   가열이 시작되면 해당 정점이 열원에서부터 거리에 따라 분홍 → 흰색으로 변함 */
function createStickerMesh(typeKey, shape) {
  var grid = shape.makeGrid();
  var positions = [];   // 각 정점의 (lx, lz)
  var indices = [];     // 삼각형 인덱스
  var posArr = [];      // BufferGeometry positions
  var colArr = [];      // BufferGeometry colors

  // 분홍색 시작 색상
  var pinkR = 1.0, pinkG = 0.62, pinkB = 0.77;

  if (typeKey === 'copper-c') {
    // ㄷ 모양: 그리드 점들 중 contains 통과한 것만 사용 + 들로네 대신 격자 인덱싱
    // 격자 단순 인덱싱 (각 셀 4점 모두 contains일 때만 두 삼각형 추가)
    var nx = grid.nx, nz = grid.nz;
    var idxMap = {};
    var vIdx = 0;
    function gridKey(i, j) { return i + ',' + j; }
    function getOrAddVertex(i, j) {
      var key = gridKey(i, j);
      if (idxMap[key] != null) return idxMap[key];
      var lx = (i / nx) * 1.4;
      var lz = -0.5 + (j / nz) * 1.0;
      if (!shape.contains(lx, lz)) return -1;
      idxMap[key] = vIdx;
      positions.push({ x: lx, z: lz });
      posArr.push(lx, COPPER_THICKNESS / 2 + 0.0005, lz);
      colArr.push(pinkR, pinkG, pinkB);
      vIdx++;
      return idxMap[key];
    }
    for (var i = 0; i < nx; i++) {
      for (var j = 0; j < nz; j++) {
        var a = getOrAddVertex(i, j);
        var b = getOrAddVertex(i + 1, j);
        var c = getOrAddVertex(i + 1, j + 1);
        var d = getOrAddVertex(i, j + 1);
        if (a >= 0 && b >= 0 && c >= 0 && d >= 0) {
          indices.push(a, b, c);
          indices.push(a, c, d);
        }
      }
    }
  } else {
    // 길게/정사각형: 일반 격자
    var nx2 = grid.nx, nz2 = grid.nz;
    for (var ii = 0; ii <= nx2; ii++) {
      for (var jj = 0; jj <= nz2; jj++) {
        var lx2 = (ii / nx2) * shape.width;
        var lz2 = -shape.depth / 2 + (jj / nz2) * shape.depth;
        positions.push({ x: lx2, z: lz2 });
        posArr.push(lx2, COPPER_THICKNESS / 2 + 0.0005, lz2);
        colArr.push(pinkR, pinkG, pinkB);
      }
    }
    for (var ii2 = 0; ii2 < nx2; ii2++) {
      for (var jj2 = 0; jj2 < nz2; jj2++) {
        var a2 = ii2 * (nz2 + 1) + jj2;
        var b2 = (ii2 + 1) * (nz2 + 1) + jj2;
        var c2 = (ii2 + 1) * (nz2 + 1) + (jj2 + 1);
        var d2 = ii2 * (nz2 + 1) + (jj2 + 1);
        indices.push(a2, b2, c2);
        indices.push(a2, c2, d2);
      }
    }
  }

  var geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(posArr, 3));
  var colorAttr = new THREE.Float32BufferAttribute(colArr, 3);
  geo.setAttribute('color', colorAttr);
  geo.setIndex(indices);
  geo.computeVertexNormals();

  var mat = new THREE.MeshStandardMaterial({
    vertexColors: true, roughness: 0.7, metalness: 0.0, side: THREE.DoubleSide
  });
  var mesh = new THREE.Mesh(geo, mat);
  mesh.receiveShadow = true;

  return {
    mesh: mesh,
    geometry: geo,
    colorAttr: colorAttr,
    positions: positions,    // 각 정점의 (lx, lz) 로컬 좌표
    changedFlags: new Array(positions.length)  // 흰색으로 변화 정도 [0..1]
  };
}

/* ───── 책상 바닥 초록색 드롭존 (구리판 그림자 모양) ─────
   구리판이 클램프에 고정된 후, 그 아래 책상 바닥에 같은 모양으로 표시.
   초를 이 영역 안에 드롭할 수 있음. */
function buildGreenZone(typeKey) {
  var shape = COPPER_SHAPES[typeKey];
  if (!shape) return null;

  var greenMat = new THREE.MeshBasicMaterial({
    color: 0x7ed957, transparent: true, opacity: 0.55, side: THREE.DoubleSide
  });

  var mesh;
  if (typeKey === 'copper-c') {
    var sh = new THREE.Shape();
    sh.moveTo(0, -0.5);
    sh.lineTo(1.4, -0.5);
    sh.lineTo(1.4, -0.3);
    sh.lineTo(0.5, -0.3);
    sh.lineTo(0.5, 0.3);
    sh.lineTo(1.4, 0.3);
    sh.lineTo(1.4, 0.5);
    sh.lineTo(0, 0.5);
    sh.closePath();
    var geo = new THREE.ShapeGeometry(sh);
    geo.rotateX(-Math.PI / 2);
    mesh = new THREE.Mesh(geo, greenMat);
  } else {
    var geo2 = new THREE.PlaneGeometry(shape.width, shape.depth);
    geo2.rotateX(-Math.PI / 2);
    mesh = new THREE.Mesh(geo2, greenMat);
  }

  // 위치: 클램프 끝의 xz와 같은 위치 (단, 책상 바닥 y ≈ 0.025로 띄움)
  if (typeKey === 'copper-c') {
    mesh.position.set(COPPER_LOCAL_ORIGIN_WORLD.x, 0.025, COPPER_LOCAL_ORIGIN_WORLD.z);
  } else {
    // BoxGeometry 기준: 중심이 (width/2, 0)이므로 동일 위치 보정
    mesh.position.set(COPPER_LOCAL_ORIGIN_WORLD.x + shape.width / 2, 0.025, COPPER_LOCAL_ORIGIN_WORLD.z);
  }

  return mesh;
}

/* ───── 좌표 변환: 월드(x,z) → 구리판 로컬(lx,lz) ───── */
function worldToCopperLocal(wx, wz) {
  return {
    x: wx - COPPER_LOCAL_ORIGIN_WORLD.x,
    z: wz - COPPER_LOCAL_ORIGIN_WORLD.z
  };
}

/* ───── 초록색 드롭존 안에 있는지 검사 ───── */
function isInsideGreenZone(wx, wz) {
  if (!selectedCopperType) return false;
  var local = worldToCopperLocal(wx, wz);
  var shape = COPPER_SHAPES[selectedCopperType];
  return shape.contains(local.x, local.z);
}

/* ───── 시뮬레이션 시작 ───── */
function startSimulation() {
  isSimulating = true;
  simStartTime = Date.now();
  heatStartTime = Date.now();
  document.getElementById('speed-bar').style.display = 'flex';

  // 약 12초 후 '실험 정리하기' 버튼 표시
  setTimeout(function () {
    if (isSimulating) {
      document.getElementById('next-btn').style.display = 'block';
    }
  }, 12000);
}

/* ───── 매 프레임 시뮬레이션 업데이트 ─────
   초가 드래그된 위치(heatSourceWorldPos)를 중심으로 원형으로 색깔이 변함.
   초에서 가까운 곳부터 변하고, 모든 구리판 종류에서 같은 빠르기로 변함.

   변화 모델:
     - 각 정점의 열원으로부터 거리(미터) d
     - 가열 시작 후 경과 시간 t (초, simSpeed 가속 반영)
     - 변화 속도 spreadSpeed = 0.07 m/s
     - 정점 도달 진행도: progress = clamp((t * spreadSpeed - d) / 0.05, 0, 1)
       (열파면이 정점에 도달한 후 0.05m 너비에서 부드럽게 분홍→흰색)
*/
function updateSimulation() {
  if (!isSimulating || !heatStartTime || !stickerVertexData || !heatSourceWorldPos) return;

  var nowMs = Date.now();
  // 누적 가속 시간(초). simSpeed가 변하면 다음 프레임부터 영향.
  if (typeof updateSimulation._lastMs === 'undefined' || updateSimulation._lastMs === null) {
    updateSimulation._lastMs = nowMs;
    updateSimulation._accSec = 0;
  }
  var dtSec = (nowMs - updateSimulation._lastMs) / 1000.0;
  updateSimulation._lastMs = nowMs;
  updateSimulation._accSec += dtSec * simSpeed;
  var t = updateSimulation._accSec;

  var spreadSpeed = 0.07;     // 모든 구리판 동일
  var fadeWidth = 0.05;       // 열파면 부드러움
  // 열원 로컬 좌표
  var heatLocal = worldToCopperLocal(heatSourceWorldPos.x, heatSourceWorldPos.z);

  var pts = stickerVertexData.positions;
  var col = stickerVertexData.colorAttr;
  var changed = stickerVertexData.changedFlags;

  // 분홍색 -> 흰색
  var pinkR = 1.0, pinkG = 0.62, pinkB = 0.77;
  var whiteR = 1.0, whiteG = 1.0, whiteB = 1.0;

  var anyChanged = false;
  for (var k = 0; k < pts.length; k++) {
    var p = pts[k];
    var dx = p.x - heatLocal.x;
    var dz = p.z - heatLocal.z;
    var d = Math.sqrt(dx * dx + dz * dz);
    var progress = (t * spreadSpeed - d) / fadeWidth;
    if (progress < 0) progress = 0;
    if (progress > 1) progress = 1;
    if (progress > 0 && (changed[k] == null || progress > changed[k])) {
      changed[k] = progress;
      var rr = pinkR + (whiteR - pinkR) * progress;
      var gg = pinkG + (whiteG - pinkG) * progress;
      var bb = pinkB + (whiteB - pinkB) * progress;
      col.setXYZ(k, rr, gg, bb);
      anyChanged = true;
    }
  }
  if (anyChanged) col.needsUpdate = true;
}

/* ───── 촛불 흔들림 (animate에서 호출됨: updateFlame) ───── */
function updateFlame() {
  if (!candleAssembly) return;
  var fm = candleAssembly.getObjectByName('flame');
  var im = candleAssembly.getObjectByName('flameInner');
  var fl = candleAssembly.getObjectByName('flameLight');
  var tt = Date.now();
  if (fm) {
    fm.scale.x = 1 + Math.sin(tt * 0.013) * 0.1;
    fm.scale.y = 1 + Math.sin(tt * 0.016) * 0.15;
  }
  if (im) {
    im.scale.x = 1 + Math.sin(tt * 0.017) * 0.08;
    im.scale.y = 1 + Math.cos(tt * 0.011) * 0.12;
  }
  if (fl) fl.intensity = 1.6 + Math.sin(tt * 0.01) * 0.3;
}

function resetSimulation() {
  isSimulating = false;
  simStartTime = null;
  heatStartTime = null;
  updateSimulation._lastMs = null;
  updateSimulation._accSec = 0;
}

/* ========================================================================
   결과 요약 (공통)
   ======================================================================== */
function goToSummary() {
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('summary-overlay').style.display = 'flex';
  isSimulating = false;
  // (v2) 결과 요약 나레이션 자동 재생
  //   - summarySegments가 정의되어 있으면 다중 세그먼트 순차 재생
  //   - 없고 audioFiles['summary']만 정의되어 있으면 단일 mp3 재생
  //   - 둘 다 없으면 audioTexts['summary']로 TTS 폴백
  //   ★⑧ 추가 동작이 필요하면 아래에 작성 (예: 추가 mp3 체이닝)
  playSummarySegments();
}

/* ========================================================================
   ★⑧ 리셋 (실험별 상태 정리 코드를 추가하세요)
   ======================================================================== */
function resetExperiment() {
  stopAudio();
  segmentChainToken++;  // (v2) 진행 중 세그먼트 체인 무효화 — 늦게 도착할 onEnd 콜백 차단
  resetSimulation();

  // UI 초기화 (공통)
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('summary-overlay').style.display = 'none';
  document.getElementById('speed-bar').style.display = 'none';
  document.getElementById('side-panel').style.display = 'flex';
  document.getElementById('drop-zone-indicator').style.display = 'none';

  // 카메라 각도/줌 초기값
  targetRot = { x: 0.3, y: -0.4 };
  targetZoom = 5.5;

  // 속도 초기화
  setSpeed(1);

  // ★⑧ 여기에 실험별 상태/3D 오브젝트 정리 코드 추가
  // 1) 동적으로 생성된 3D 오브젝트 제거
  if (copperPlate) {
    scene.remove(copperPlate);
    // 메모리 정리
    copperPlate.traverse(function(obj) {
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) {
        if (Array.isArray(obj.material)) obj.material.forEach(function(m){ m.dispose(); });
        else obj.material.dispose();
      }
    });
    copperPlate = null;
  }
  if (copperGreenZone) {
    scene.remove(copperGreenZone);
    if (copperGreenZone.geometry) copperGreenZone.geometry.dispose();
    if (copperGreenZone.material) copperGreenZone.material.dispose();
    copperGreenZone = null;
  }
  if (candleAssembly) {
    scene.remove(candleAssembly);
    candleAssembly.traverse(function(obj) {
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) {
        if (Array.isArray(obj.material)) obj.material.forEach(function(m){ m.dispose(); });
        else obj.material.dispose();
      }
    });
    candleAssembly = null;
  }

  // 2) 시뮬레이션 상태 변수 초기화
  selectedCopperType = null;
  heatSourceWorldPos = null;
  stickerVertexData = null;

  // 3) 사이드 패널 초기화 — Step 1 카드들 다시 표시, Step 2/3 숨김
  var step1Cards = document.querySelectorAll('.panel-step1');
  for (var i = 0; i < step1Cards.length; i++) step1Cards[i].style.display = 'block';
  var step2Card = document.querySelector('.panel-step2');
  if (step2Card) step2Card.style.display = 'none';
  var step3Panel = document.getElementById('panel-step3');
  if (step3Panel) step3Panel.style.display = 'none';

  // 단계 0으로 돌아가기
  setStep(0);
  // 첫 단계 나레이션 재생
  playAudio('take2');
}

/* ========================================================================
   초기화 흐름 (공통)
   ======================================================================== */
function init() {
  initScene();
  setupCameraControls();
  initTTS();

  // ★⑤ 실험별 3D 장비 배치
  buildStand();

  // ★⑥ 실험별 드래그 이벤트 바인딩
  // Step 1: 구리판 카드 드래그 → 클램프 끝 근처로 드롭
  setupCardDrag({
    selector: '.panel-step1',
    enabledIf: function() { return currentStep === 0; },
    onMove: function(el, sx, sy) {
      // 클램프 끝 근처로 가까이 가면 드롭존 인디케이터 강조
      var clampScreen = worldToScreen(getClampWorldPos().x, getClampWorldPos().y, getClampWorldPos().z);
      var dist = Math.hypot(sx - clampScreen.x, sy - clampScreen.y);
      var dz = document.getElementById('drop-zone-indicator');
      dz.style.display = 'block';
      var size = 120;
      dz.style.left = (clampScreen.x - size / 2) + 'px';
      dz.style.top = (clampScreen.y - size / 2) + 'px';
      dz.style.width = size + 'px';
      dz.style.height = size + 'px';
      if (dist < 90) dz.classList.add('highlight');
      else dz.classList.remove('highlight');
    },
    onEnd: function() {
      var dz = document.getElementById('drop-zone-indicator');
      dz.style.display = 'none';
      dz.classList.remove('highlight');
    },
    onDrop: function(cardEl, sx, sy) {
      var clampScreen = worldToScreen(getClampWorldPos().x, getClampWorldPos().y, getClampWorldPos().z);
      var dist = Math.hypot(sx - clampScreen.x, sy - clampScreen.y);
      if (dist > 110) return;  // 너무 멀면 무효

      // 구리판 생성 + 초록 드롭존 표시
      selectedCopperType = cardEl.getAttribute('data-type');
      copperPlate = buildCopperPlate(selectedCopperType);
      scene.add(copperPlate);
      copperGreenZone = buildGreenZone(selectedCopperType);
      scene.add(copperGreenZone);

      // Step 1 카드들 숨기고 Step 2 (초) 카드 표시
      var step1Cards = document.querySelectorAll('.panel-step1');
      for (var i = 0; i < step1Cards.length; i++) step1Cards[i].style.display = 'none';
      var step2Card = document.querySelector('.panel-step2');
      if (step2Card) step2Card.style.display = 'block';

      setStep(1);
      playAudio('take3');  // Step 2 나레이션 (단일 세그먼트)
    }
  });

  // Step 2: 초 카드 드래그 → 초록 드롭존(구리판 아래) 안으로 드롭
  setupCardDrag({
    selector: '.panel-step2',
    enabledIf: function() { return currentStep === 1; },
    onMove: function(el, sx, sy) {
      var world = screenToWorld(sx, sy);
      var dz = document.getElementById('drop-zone-indicator');
      if (world && isInsideGreenZone(world.x, world.z)) {
        // 그린존 안: 인디케이터 강조 표시 (초 위치 근처)
        var sp = worldToScreen(world.x, 0, world.z);
        dz.style.display = 'block';
        dz.style.left = (sp.x - 60) + 'px';
        dz.style.top = (sp.y - 60) + 'px';
        dz.style.width = '120px';
        dz.style.height = '120px';
        dz.classList.add('highlight');
      } else {
        dz.style.display = 'none';
        dz.classList.remove('highlight');
      }
    },
    onEnd: function() {
      var dz = document.getElementById('drop-zone-indicator');
      dz.style.display = 'none';
      dz.classList.remove('highlight');
    },
    onDrop: function(cardEl, sx, sy) {
      var world = screenToWorld(sx, sy);
      if (!world || !isInsideGreenZone(world.x, world.z)) return;

      // 삼발이+쇠그물+초 어셈블리를 드롭한 위치에 생성
      candleAssembly = buildCandleAssembly(world.x, world.z);
      scene.add(candleAssembly);

      // 불꽃의 월드 좌표(xz)를 열원으로 등록
      // candleAssembly.scale = 1.4156, 불꽃 로컬 y는 ringY+0.112 = 0.742, 그룹 y=0.02
      heatSourceWorldPos = { x: world.x, z: world.z };

      // Step 2 카드 숨기고 Step 3 패널(다시 하기 버튼) 표시
      var step2Card = document.querySelector('.panel-step2');
      if (step2Card) step2Card.style.display = 'none';
      var step3Panel = document.getElementById('panel-step3');
      if (step3Panel) step3Panel.style.display = 'block';

      // 초록 드롭존은 가열이 시작되면 숨김 (시각적 정리)
      if (copperGreenZone) {
        copperGreenZone.visible = false;
      }

      setStep(2);  // Step 3 진입 → stepSegments[2]가 자동 재생됨
      // 초를 드래그하자마자 색깔 변화 시작
      startSimulation();
    }
  });

  // 로딩 화면 숨김 + 목표 팝업 표시
  setTimeout(function () {
    document.getElementById('loading').style.opacity = '0';
    setTimeout(function () {
      document.getElementById('loading').style.display = 'none';
      showObjectivePopup();
    }, 500);
  }, 500);

  animate();
}

function showObjectivePopup() {
  var popup = document.getElementById('objective-popup');
  popup.style.display = 'flex';

  // 첫 탭: BGM 시작 + 목표 나레이션 재생
  // 두 번째 탭: 팝업 닫기 + Step 0 시작
  var clickCount = 0;
  function handleClick() {
    clickCount++;
    if (clickCount === 1) {
      startBgMusic();
      playAudio('take1');  // ★③ 탐구 목표 나레이션 키
    } else {
      popup.style.display = 'none';
      popup.removeEventListener('click', handleClick);
      stopAudio();
      setTimeout(function () {
        setStep(0);
        // ★③ Step 1(코드 인덱스 0) 나레이션
        playAudio('take2');
      }, 300);
    }
  }
  popup.addEventListener('click', handleClick);
}

// 페이지 준비 완료 시 init 호출
init();
</script>
</body>
</html>
