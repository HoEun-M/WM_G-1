<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가상실험실 제작 지시서 빌더</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #00b894;
  --accent2: #00cec9;
  --accent-light: #55efc4;
  --bg-deep: #0f1923;
  --bg-mid: #1a2a3a;
  --text: #e8ecf0;
  --text-dim: rgba(255,255,255,0.4);
  --text-muted: #b2bec3;
  --card-bg: rgba(255,255,255,0.04);
  --card-border: rgba(255,255,255,0.08);
  --danger: #ff5252;
  --warning: #fdcb6e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: linear-gradient(165deg, var(--bg-deep) 0%, var(--bg-mid) 40%, #0d2137 100%);
  min-height: 100vh;
  color: var(--text);
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,184,148,0.3); border-radius: 3px; }

/* ── 입력 필드 ── */
.fi {
  width: 100%; padding: 11px 14px;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 10px; color: var(--text);
  font-size: 14px; font-family: inherit;
  transition: all 0.2s; outline: none;
}
.fi:focus { border-color: var(--accent); background: rgba(0,184,148,0.06); box-shadow: 0 0 0 3px rgba(0,184,148,0.1); }
.fi::placeholder { color: rgba(255,255,255,0.3); }
textarea.fi { resize: vertical; min-height: 72px; line-height: 1.6; }
select.fi { cursor: pointer; }

/* ── 버튼 ── */
.bp { padding: 10px 20px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.bp:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,184,148,0.4); }
.bs { padding: 8px 16px; background: rgba(255,255,255,0.08); color: var(--text-muted); border: 1.5px solid rgba(255,255,255,0.12); border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.bs:hover { background: rgba(255,255,255,0.14); color: #fff; }
.bd { padding: 6px 12px; background: rgba(255,82,82,0.12); color: var(--danger); border: 1px solid rgba(255,82,82,0.2); border-radius: 8px; font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.bd:hover { background: rgba(255,82,82,0.25); }

/* ── 카드 ── */
.card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 24px; margin-bottom: 16px; transition: all 0.2s; }
.card:hover { border-color: rgba(0,184,148,0.2); }
.scard { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 20px; margin-bottom: 14px; position: relative; }

/* ── 탭 ── */
.tab-btn { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: transparent; border: none; color: rgba(255,255,255,0.45); font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 10px; transition: all 0.2s; white-space: nowrap; font-family: inherit; }
.tab-btn:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.05); }
.tab-btn.active { color: #fff; background: rgba(0,184,148,0.15); border: 1px solid rgba(0,184,148,0.3); }

/* ── 라벨 ── */
.lb { font-size: 13px; font-weight: 600; color: #7fb8a4; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.hint { font-size: 11.5px; color: rgba(255,255,255,0.3); margin-top: 4px; line-height: 1.5; }

/* ── 사진 경고 ── */
.photo-warn { display: flex; align-items: flex-start; gap: 8px; padding: 10px 14px; background: rgba(253,203,110,0.08); border: 1px solid rgba(253,203,110,0.2); border-radius: 10px; margin-top: 8px; font-size: 12px; color: var(--warning); line-height: 1.5; }

/* ── 미리보기 ── */
.preview-md { background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); border-radius: 12px; padding: 20px; font-size: 13px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; max-height: 500px; overflow-y: auto; color: var(--text-muted); }

/* ── 코드 템플릿 토글 ── */
.tmpl-toggle { display: flex; align-items: center; gap: 10px; padding: 14px 18px; background: rgba(255,255,255,0.03); border: 1.5px solid rgba(255,255,255,0.08); border-radius: 12px; cursor: pointer; transition: all 0.2s; margin-bottom: 10px; user-select: none; }
.tmpl-toggle:hover { border-color: rgba(0,184,148,0.25); background: rgba(255,255,255,0.05); }
.tmpl-toggle.open { border-color: rgba(0,184,148,0.3); background: rgba(0,184,148,0.04); }
.tmpl-content { padding: 14px 18px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.06); border-radius: 0 0 12px 12px; margin-top: -11px; margin-bottom: 12px; font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.6; }
.tmpl-content code { background: rgba(255,255,255,0.08); padding: 1px 5px; border-radius: 4px; font-size: 11.5px; color: var(--accent-light); }

/* ── 뱃지 ── */
.badge { background: rgba(0,184,148,0.2); color: var(--accent); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }

/* ── 애니메이션 ── */
.tab-content { animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 768px) {
  .tab-btn .tl { display: none; }
  .tab-btn { padding: 8px 10px; font-size: 13px; }
  .g2 { grid-template-columns: 1fr !important; }
}
</style>
</head>
<body>

<div id="app"></div>

<script>
/* ═══════════════════════════════════════════════
   가상실험실 제작 지시서 빌더
   ═══════════════════════════════════════════════ */

/* ── 레퍼런스 장비 ── */
var EQUIPMENT_REFS = [
  { id: 'stand', name: '스탠드 (스탠드+클램프+고정집게)' },
  { id: 'tripod', name: '삼발이' },
  { id: 'wireGauze', name: '쇠그물 (석면 대용 철망)' },
  { id: 'candleAssembly', name: '삼발이+쇠그물+초 (통합)' }
];

/* ── 기존 코드 템플릿 (참고용) ── */
var CODE_TEMPLATES = [
  {
    id: 'heatConduction',
    title: '열전도 — 색 변화 확산',
    desc: '그리드 기반 열전도 시뮬레이션. vertexColors + sigmoid S-curve로 열 변색 스티커의 색상 변화를 표현합니다.',
    details: '• GS×GS 그리드 배열로 열 전파 계산\n• 단순 형태: 유클리드 거리 → 동심원 확산\n• 복잡한 형태(ㄷ자 등): BFS 경로 거리 → 판 모양을 따라 확산\n• heatToColor() 함수: sigmoid S-curve로 핑크→흰색 전환\n• 매 프레임 updateColors()에서 vertex 색상 갱신'
  },
  {
    id: 'convection',
    title: '대류 — 파티클 흐름',
    desc: '파티클 시스템으로 액체/기체의 대류 현상을 표현합니다. 열원 근처에서 생성된 파티클이 상승→벽면 이동→하강하며 순환합니다.',
    details: '• particles 배열에 파티클 객체 생성\n• 열원 근처에서 spawn, 위로 이동\n• 벽면을 따라 순환하는 경로 설정\n• animate()에서 매 프레임 위치 업데이트\n• 색상/투명도로 온도 시각화'
  }
];

/* ── 상태 ── */
var state = {
  activeTab: 0,
  copied: false,

  // 기본 정보
  unit: '', title: '', objective: '', concept: '', materials: '',

  // 장비 — 레퍼런스 체크리스트 + 커스텀 장비
  refChecks: {},  // { stand: true, tripod: false, ... }
  customEquips: [],

  // 실험 단계
  steps: [newStep()],

  // 시뮬레이션 — 자유 기술 방식으로 변경
  simDescription: '',      // 핵심 현상 설명
  simVisual: '',            // 시각화 방법
  simNote: '',              // 추가 노트
  simUseTemplate: '',       // 참고할 기존 템플릿 ID (빈 문자열이면 없음)

  // 결과 요약
  summaryTitle: '', summaryBody: '', summaryConceptBox: '', summaryNarration: '',

  // 템플릿 토글
  openTemplates: {}
};

function newStep() {
  return {
    id: Date.now() + '_' + Math.random(),
    studentAction: '', uiTransition: '', guideMessage: '',
    completionCondition: '', customInteraction: '',
    narrationKey: '', narrationText: ''
  };
}

function newEquip() {
  return { id: Date.now() + '_' + Math.random(), name: '', photoNote: '' };
}

/* ── 렌더링 ── */
function render() {
  var app = document.getElementById('app');
  var tabs = [
    { icon: '📋', label: '기본 정보' },
    { icon: '🧪', label: '실험 장비' },
    { icon: '🎯', label: '실험 단계' },
    { icon: '⚡', label: '시뮬레이션' },
    { icon: '📊', label: '결과 요약' },
    { icon: '📄', label: '미리보기' }
  ];

  var html = '';

  /* ── 탭 바 ── */
  html += '<div style="display:flex;gap:4px;padding:8px 24px 0;overflow-x:auto;flex-wrap:nowrap">';
  for (var ti = 0; ti < tabs.length; ti++) {
    html += '<button class="tab-btn' + (state.activeTab === ti ? ' active' : '') + '" onclick="switchTab(' + ti + ')">';
    html += '<span>' + tabs[ti].icon + '</span><span class="tl">' + tabs[ti].label + '</span></button>';
  }
  html += '</div>';

  /* ── 컨텐츠 ── */
  html += '<div style="padding:16px 24px 80px;max-width:860px;margin:0 auto" class="tab-content" key="' + state.activeTab + '">';

  if (state.activeTab === 0) html += renderBasicInfo();
  else if (state.activeTab === 1) html += renderEquipment();
  else if (state.activeTab === 2) html += renderSteps();
  else if (state.activeTab === 3) html += renderSimulation();
  else if (state.activeTab === 4) html += renderSummary();
  else if (state.activeTab === 5) html += renderPreview();

  html += '</div>';

  /* ── 하단 바 ── */
  html += '<div style="position:fixed;bottom:0;left:0;right:0;padding:12px 24px;background:rgba(15,25,35,0.95);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center;z-index:100">';
  html += '<button class="bs" onclick="switchTab(' + Math.max(0, state.activeTab - 1) + ')" ' + (state.activeTab === 0 ? 'style="opacity:0.3" disabled' : '') + '>← 이전</button>';
  html += '<div style="font-size:12px;color:rgba(255,255,255,0.35)">' + (state.activeTab + 1) + ' / ' + tabs.length + '</div>';
  if (state.activeTab < tabs.length - 1) {
    html += '<button class="' + (state.activeTab === tabs.length - 2 ? 'bp' : 'bs') + '" onclick="switchTab(' + (state.activeTab + 1) + ')">' + (state.activeTab === tabs.length - 2 ? '미리보기 →' : '다음 →') + '</button>';
  } else {
    html += '<div style="width:70px"></div>';
  }
  html += '</div>';

  app.innerHTML = html;
}

/* ═══ 탭 0: 기본 정보 ═══ */
function renderBasicInfo() {
  var h = '<div class="card">';
  h += '<div style="font-size:17px;font-weight:700;color:#fff;margin-bottom:20px">📋 실험 기본 정보</div>';
  h += '<div style="display:flex;flex-direction:column;gap:16px">';

  h += field('교과서 단원', 'input', 'unit', '예: 5학년 1학기 4단원 - 열과 우리 생활', '비워두면 교과서 PDF에서 자동 추출합니다.');
  h += field('탐구 제목', 'input', 'title', '예: 고체에서 열은 어떻게 이동할까요?');
  h += field('탐구 목표', 'textarea', 'objective', '예: 고체 물질의 한쪽 끝을 가열했을 때 열이 이동하는 방향을 설명할 수 있다.');
  h += field('핵심 개념', 'textarea', 'concept', '예: 전도 — 고체에서 열이 온도가 높은 곳에서 낮은 곳으로 이동하는 현상');
  h += field('준비물', 'textarea', 'materials', '예: 구리판, 열 변색 스티커, 초, 삼발이, 쇠그물, 스탠드');

  h += '</div></div>';
  return h;
}

/* ═══ 탭 1: 실험 장비 ═══ */
function renderEquipment() {
  var h = '';

  /* ── 레퍼런스 장비 체크리스트 ── */
  h += '<div class="card">';
  h += '<div style="font-size:17px;font-weight:700;color:#fff;margin-bottom:6px">🧪 레퍼런스 장비</div>';
  h += '<div class="hint" style="margin-bottom:16px">3D 코드가 이미 준비된 장비입니다. 이 실험에서 사용하는 장비만 체크하세요. 체크하지 않아도 교과서 PDF의 준비물을 보고 자동 판단됩니다.</div>';

  for (var ri = 0; ri < EQUIPMENT_REFS.length; ri++) {
    var r = EQUIPMENT_REFS[ri];
    var checked = !!state.refChecks[r.id];
    h += '<label style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:' + (checked ? 'rgba(0,184,148,0.08)' : 'rgba(255,255,255,0.02)') + ';border:1.5px solid ' + (checked ? 'rgba(0,184,148,0.3)' : 'rgba(255,255,255,0.06)') + ';border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all 0.2s">';
    h += '<input type="checkbox" ' + (checked ? 'checked' : '') + ' onchange="toggleRef(\'' + r.id + '\')" style="width:18px;height:18px;accent-color:var(--accent);cursor:pointer">';
    h += '<div style="flex:1"><div style="font-size:14px;font-weight:600;color:' + (checked ? '#fff' : 'rgba(255,255,255,0.6)') + '">' + r.name + '</div>';
    h += '<div style="font-size:11.5px;color:rgba(255,255,255,0.35);margin-top:2px">레퍼런스 코드 자동 포함</div></div>';
    if (checked) h += '<span style="font-size:12px;color:var(--accent);font-weight:600">✓ 사용</span>';
    h += '</label>';
  }
  h += '</div>';

  /* ── 레퍼런스 없는 장비 ── */
  h += '<div class="card">';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
  h += '<div style="font-size:17px;font-weight:700;color:#fff">📸 레퍼런스 없는 장비</div>';
  h += '<button class="bp" onclick="addCustomEquip()" style="font-size:13px;padding:8px 16px">+ 장비 추가</button></div>';

  h += '<div class="hint" style="margin-bottom:16px">위 레퍼런스 목록에 없는 장비는 교과서 사진을 보고 새로 3D 모델링해야 합니다. 장비를 등록하고 <strong style="color:var(--warning)">실물 또는 교과서 사진</strong>을 함께 첨부해 주세요.</div>';

  if (state.customEquips.length === 0) {
    h += '<div style="padding:24px;text-align:center;color:rgba(255,255,255,0.25);font-size:13px;border:1.5px dashed rgba(255,255,255,0.08);border-radius:12px">';
    h += '레퍼런스에 없는 장비가 있으면 추가하세요.<br>없으면 비워 둬도 됩니다.</div>';
  }

  for (var i = 0; i < state.customEquips.length; i++) {
    var eq = state.customEquips[i];
    h += '<div class="scard">';
    h += '<div style="display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap">';
    h += '<div style="flex:1;min-width:200px"><div class="lb">장비 이름</div>';
    h += '<input class="fi" value="' + esc(eq.name) + '" onchange="updateCustomEquip(' + i + ',\'name\',this.value)" placeholder="예: 비커, 알코올 램프, 온도계 등"></div>';
    h += '<button class="bd" onclick="removeCustomEquip(' + i + ')" style="margin-top:24px">삭제</button>';
    h += '</div>';

    h += '<div class="photo-warn"><span style="font-size:16px">📸</span><div>';
    h += '<strong>사진 첨부 필요!</strong> 세부 구조 파악을 위해 <strong>교과서 사진 또는 실물 사진</strong>을 반드시 첨부해 주세요. 3D 모델링 정확도에 직접적인 영향을 줍니다.';
    h += '<div style="margin-top:6px"><input class="fi" value="' + esc(eq.photoNote || '') + '" onchange="updateCustomEquip(' + i + ',\'photoNote\',this.value)" placeholder="사진 파일명 또는 장비 특징 메모 (선택)" style="font-size:12px;padding:7px 10px"></div>';
    h += '</div></div>';

    h += '</div>';
  }

  h += '</div>';
  return h;
}

/* ═══ 탭 2: 실험 단계 ═══ */
function renderSteps() {
  var h = '<div class="card">';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">';
  h += '<div style="font-size:17px;font-weight:700;color:#fff">🎯 실험 단계 설계 <span class="badge">' + state.steps.length + '개</span></div>';
  h += '<button class="bp" onclick="addStep()" style="font-size:13px;padding:8px 16px">+ 단계 추가</button></div>';

  h += '<div class="hint" style="margin-bottom:16px">비워둔 항목은 원본 지시서의 기본 규칙에 따라 자동 결정됩니다. 마지막 Step은 항상 "결과 요약 팝업 표시"입니다.</div>';

  for (var i = 0; i < state.steps.length; i++) {
    var s = state.steps[i];
    h += '<div class="scard">';

    // 헤더
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">';
    h += '<div style="display:flex;align-items:center;gap:10px">';
    h += '<div style="width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff">' + i + '</div>';
    h += '<span style="font-size:15px;font-weight:600;color:#fff">Step ' + i + (i === 0 ? ' (초기 상태)' : '') + '</span></div>';
    h += '<div style="display:flex;gap:4px">';
    h += '<button class="bs" onclick="moveStep(' + i + ',-1)" style="padding:4px 10px;font-size:14px">↑</button>';
    h += '<button class="bs" onclick="moveStep(' + i + ',1)" style="padding:4px 10px;font-size:14px">↓</button>';
    h += '<button class="bd" onclick="removeStep(' + i + ')">삭제</button>';
    h += '</div></div>';

    // 필드 그리드
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px" class="g2">';
    h += stepField('🖐 학생 행동 (조작 활동)', i, 'studentAction', '예: 삼발이+쇠그물 카드를 3D 씬의 드롭 존으로 드래그');
    h += stepField('🔄 UI 전환', i, 'uiTransition', '예: 사이드 패널 숨김, 속도 조절 바 표시');
    h += stepField('💬 가이드 메시지', i, 'guideMessage', '예: 삼발이와 쇠그물을 실험대 위에 올려놓으세요.');
    h += stepField('✅ 완료 조건', i, 'completionCondition', '예: 3D 드롭 존에 장비 드롭 성공');

    h += '<div style="margin-top:12px"><div class="lb">🎮 실험별 고유 인터랙션 (선택)</div>';
    h += '<input class="fi" value="' + esc(s.customInteraction) + '" onchange="updateStep(' + i + ',\'customInteraction\',this.value)" placeholder="예: 재배치, 되돌리기, 방향 전환 등"></div>';

    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px" class="g2">';
    h += '<div><div class="lb">🔊 mp3 파일명</div><input class="fi" value="' + esc(s.narrationKey) + '" onchange="updateStep(' + i + ',\'narrationKey\',this.value)" placeholder="예: tts_take3.mp3"></div>';
    h += '<div><div class="lb">📝 나레이션 대사 <span style="font-size:10.5px;color:rgba(255,255,255,0.3);font-weight:400">(mp3 없을 시 TTS 재생)</span></div><input class="fi" value="' + esc(s.narrationText) + '" onchange="updateStep(' + i + ',\'narrationText\',this.value)" placeholder="예: 삼발이와 쇠그물을 준비하세요."></div>';

    h += '</div>';
  }

  h += '</div>';
  return h;
}

/* ═══ 탭 3: 시뮬레이션 (자유 기술 방식) ═══ */
function renderSimulation() {
  var h = '<div class="card">';
  h += '<div style="font-size:17px;font-weight:700;color:#fff;margin-bottom:6px">⚡ 시뮬레이션 설계</div>';
  h += '<div class="hint" style="margin-bottom:20px">이 실험에서 표현해야 할 핵심 현상과 시각화 방법을 자유롭게 기술하세요. 어떤 실험이든 대응 가능합니다.</div>';

  h += '<div style="display:flex;flex-direction:column;gap:16px">';

  h += '<div><div class="lb">🔬 핵심 실험 현상</div>';
  h += '<textarea class="fi" onchange="updateState(\'simDescription\',this.value)" placeholder="이 실험에서 관찰/표현해야 할 핵심 현상을 설명하세요.\n\n예시:\n• 열전도: 금속판 한쪽을 가열하면 열이 점점 반대쪽으로 전달되는 현상\n• 대류: 비커 속 물을 가열하면 잉크가 위로 올라갔다가 순환하는 현상\n• 증발: 물이 수증기로 변하여 공기 중으로 퍼지는 현상\n• 용해: 설탕이 물에 녹아 점점 사라지는 현상\n• 자석: N극과 S극이 서로 끌어당기거나 밀어내는 현상" rows="5">' + esc(state.simDescription) + '</textarea></div>';

  h += '<div><div class="lb">🎨 시각화 방법</div>';
  h += '<textarea class="fi" onchange="updateState(\'simVisual\',this.value)" placeholder="핵심 현상을 3D 씬에서 어떻게 시각적으로 표현할지 설명하세요.\n\n예시:\n• 색상 변화 확산 (열 변색 스티커 → vertexColors)\n• 파티클 흐름 (잉크 입자 → 순환 경로)\n• 오브젝트 크기/형태 변화\n• 투명도 애니메이션\n• 새 오브젝트 생성/소멸" rows="4">' + esc(state.simVisual) + '</textarea></div>';

  h += '<div><div class="lb">📝 추가 노트 (선택)</div>';
  h += '<textarea class="fi" onchange="updateState(\'simNote\',this.value)" placeholder="시뮬레이션 속도, 특수 효과, 참고 사항 등" rows="3">' + esc(state.simNote) + '</textarea></div>';

  h += '</div>';

  /* ── 기존 코드 템플릿 참고 영역 ── */
  h += '<div style="margin-top:28px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.06)">';
  h += '<div style="font-size:14px;font-weight:600;color:rgba(255,255,255,0.6);margin-bottom:12px;display:flex;align-items:center;gap:8px">';
  h += '<span style="font-size:16px">📦</span> 기존 코드 템플릿 (참고용)';
  h += '</div>';
  h += '<div class="hint" style="margin-bottom:14px">이전에 만들어둔 시뮬레이션 코드 템플릿입니다. 해당되는 실험이면 참고하도록 지시서에 포함할 수 있습니다.</div>';

  for (var ti = 0; ti < CODE_TEMPLATES.length; ti++) {
    var t = CODE_TEMPLATES[ti];
    var isOpen = state.openTemplates[t.id];
    var isSelected = state.simUseTemplate === t.id;

    h += '<div class="tmpl-toggle' + (isOpen ? ' open' : '') + '" onclick="toggleTemplate(\'' + t.id + '\')">';
    h += '<div style="display:flex;align-items:center;gap:10px;flex:1">';
    h += '<span style="font-size:13px;transition:transform 0.2s;transform:rotate(' + (isOpen ? '90' : '0') + 'deg)">▶</span>';
    h += '<div><div style="font-weight:600;color:#fff;font-size:14px">' + t.title + '</div>';
    h += '<div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px">' + t.desc + '</div></div></div>';
    h += '<button class="' + (isSelected ? 'bp' : 'bs') + '" onclick="event.stopPropagation();selectTemplate(\'' + t.id + '\')" style="font-size:12px;padding:6px 14px;white-space:nowrap">';
    h += isSelected ? '✓ 참고 포함됨' : '지시서에 참고 포함';
    h += '</button></div>';

    if (isOpen) {
      h += '<div class="tmpl-content"><pre style="white-space:pre-wrap;margin:0;font-family:\'Noto Sans KR\',monospace">' + esc(t.details) + '</pre></div>';
    }
  }

  h += '</div>';
  h += '</div>';
  return h;
}

/* ═══ 탭 4: 결과 요약 ═══ */
function renderSummary() {
  var h = '<div class="card">';
  h += '<div style="font-size:17px;font-weight:700;color:#fff;margin-bottom:20px">📊 결과 요약 팝업 내용</div>';
  h += '<div class="hint" style="margin-bottom:16px">실험이 끝난 후 표시되는 결과 요약 팝업의 내용을 정리하세요. 비워두면 기본 템플릿이 사용됩니다.</div>';

  h += '<div style="display:flex;flex-direction:column;gap:16px">';
  h += field('제목', 'input', 'summaryTitle', '예: 실험 결과 정리');
  h += field('본문', 'textarea', 'summaryBody', '예: 고체 물질의 한쪽 끝을 가열하면 열이 온도가 높은 곳에서 낮은 곳으로 이동합니다.');
  h += field('핵심 개념 박스', 'textarea', 'summaryConceptBox', '예: 전도: 고체에서 열이 온도가 높은 곳에서 낮은 곳으로 이동하는 현상');
  h += field('정리 나레이션 텍스트 (선택)', 'textarea', 'summaryNarration', '결과 요약 시 TTS로 읽을 나레이션 전문');
  h += '</div></div>';
  return h;
}

function b64decode(b64) {
  try { return decodeURIComponent(escape(atob(b64))); } catch(e) { return atob(b64); }
}

/* ═══ 마크다운 생성 ═══ */
function generateMarkdown() {
  // 원본 파일 디코딩
  var orig1 = b64decode(ORIG_MD1_B64);
  var orig2 = b64decode(ORIG_MD2_B64);

  /* ===== 지시서 1/2 ===== */
  // 원본의 "1-1. 실험 정보 추출" 테이블을 사용자 입력으로 대체
  var md1 = orig1;

  // 1-1 섹션: 원본의 교과서 추출 안내 테이블 → 사용자가 입력한 실험 정보로 대체
  var hasBasicInfo = state.unit || state.title || state.objective || state.concept || state.materials;
  if (hasBasicInfo) {
    var infoTable = '### 1-1. 실험 정보\n\n';
    infoTable += '| 항목 | 내용 |\n|------|------|\n';
    infoTable += '| 교과서 단원 | ' + (state.unit || '(교과서에서 추출)') + ' |\n';
    infoTable += '| 탐구 제목 | ' + (state.title || '(교과서에서 추출)') + ' |\n';
    infoTable += '| 탐구 목표 | ' + (state.objective || '(교과서에서 추출)') + ' |\n';
    infoTable += '| 핵심 개념 | ' + (state.concept || '(교과서에서 추출)') + ' |\n';
    infoTable += '| 준비물 | ' + (state.materials || '(교과서에서 추출)') + ' |\n';

    // 원본의 1-1 섹션을 대체 (### 1-1 부터 ### 1-2 전까지)
    md1 = md1.replace(/### 1-1\. 실험 정보 추출[\s\S]*?(?=### 1-2)/, infoTable + '\n');
  }

  // 1-2 섹션: 사용자가 Step을 입력한 경우 대체
  var hasStepContent = state.steps.some(function(s) { return s.studentAction || s.guideMessage; });
  if (hasStepContent) {
    var stepSection = '### 1-2. 실험 단계 설계\n\n';
    stepSection += '교과서의 "탐구 과정"을 가상실험 Step으로 변환한 결과:\n\n';
    state.steps.forEach(function(s, i) {
      stepSection += '#### Step ' + i + (i === 0 ? ' (초기 상태)' : '') + '\n';
      stepSection += '- **학생 행동**: ' + (s.studentAction || '(교과서 참고하여 결정)') + '\n';
      stepSection += '- **UI 전환**: ' + (s.uiTransition || '(자동 결정)') + '\n';
      stepSection += '- **가이드 메시지**: ' + (s.guideMessage || '(교과서 문구 참고)') + '\n';
      stepSection += '- **완료 조건**: ' + (s.completionCondition || '(드래그 완료 또는 클릭)') + '\n';
      if (s.customInteraction) stepSection += '- **고유 인터랙션**: ' + s.customInteraction + '\n';
      stepSection += '\n';
    });

    md1 = md1.replace(/### 1-2\. 실험 단계 설계[\s\S]*?(?=### 1-3)/, stepSection);
  }

  // 1-3 섹션: 사용자가 장비를 지정한 경우 대체
  var checkedRefs = EQUIPMENT_REFS.filter(function(r) { return state.refChecks[r.id]; });
  var customs = state.customEquips.filter(function(e) { return e.name; });
  if (checkedRefs.length > 0 || customs.length > 0) {
    var equipSection = '### 1-3. 3D 오브젝트 파악\n\n';
    equipSection += '실험에 사용되는 장비 목록:\n\n';
    checkedRefs.forEach(function(r) { equipSection += '- **' + r.name + '**: 레퍼런스 시트 코드 사용 (`' + r.id + '`)\n'; });
    customs.forEach(function(e) { equipSection += '- **' + e.name + '**: 교과서 사진 참고하여 새로 모델링' + (e.photoNote ? ' — ' + e.photoNote : '') + '\n'; });
    equipSection += '\n';

    md1 = md1.replace(/### 1-3\. 3D 오브젝트 파악[\s\S]*?(?=---)/, equipSection);
  }


  /* ===== 지시서 2/2 ===== */
  var md2 = orig2;

  // 시뮬레이션 섹션: 사용자가 기술한 경우 "선택지 A/B/C" 앞에 삽입
  if (state.simDescription || state.simVisual || state.simNote) {
    var simInsert = '';
    if (state.simDescription) simInsert += '### 이 실험의 핵심 현상\n\n' + state.simDescription + '\n\n';
    if (state.simVisual) simInsert += '### 시각화 방법\n\n' + state.simVisual + '\n\n';
    if (state.simNote) simInsert += '### 추가 시뮬레이션 노트\n\n' + state.simNote + '\n\n';
    // "### 선택지 A" 앞에 삽입
    md2 = md2.replace('### 선택지 A:', simInsert + '### 선택지 A:');
  }

  // 참고 템플릿 선택된 경우 안내 추가
  if (state.simUseTemplate) {
    var tmpl = CODE_TEMPLATES.find(function(t) { return t.id === state.simUseTemplate; });
    if (tmpl) {
      var tmplNote = '\n\n> **참고**: 이 실험은 "' + tmpl.title + '" 코드 템플릿을 참고하여 구현하세요.\n\n';
      md2 = md2.replace('## 2. 시뮬레이션 로직', '## 2. 시뮬레이션 로직' + tmplNote);
    }
  }

  // 오디오 매핑: 사용자가 입력한 경우 원본의 예시를 대체
  var hasNarration = state.steps.some(function(s) { return s.narrationKey || s.narrationText; });
  if (hasNarration) {
    var audioSection = '### 외부 mp3 파일 방식 (base64 내장 금지!)\n\n```javascript\n';
    audioSection += '// 오디오 파일 매핑\nvar audioFiles = {\n';
    state.steps.forEach(function(s, i) {
      if (s.narrationKey) {
        var fname = s.narrationKey;
        // 키는 항상 take1, take2... 형식 (playAudio 호출과 일치)
        var key = 'take' + (i + 1);
        audioSection += "  " + key + ": '" + fname + "',  // Step " + i + "\n";
      }
    });
    audioSection += '};\n\n// TTS 폴백용 텍스트\nvar audioTexts = {\n';
    state.steps.forEach(function(s, i) {
      if (s.narrationText) {
        // 키는 항상 take1, take2... 형식 (playAudio 호출과 일치)
        var key = 'take' + (i + 1);
        audioSection += "  " + key + ": '" + s.narrationText.replace(/'/g, "\\'") + "',\n";
      }
    });
    audioSection += '};\n```\n\n';

    md2 = md2.replace(/### 외부 mp3 파일 방식[\s\S]*?(?=### TTS 초기화)/, audioSection);
  }

  // 결과 요약 내용: 사용자가 입력한 경우 추가
  if (state.summaryTitle || state.summaryBody || state.summaryConceptBox || state.summaryNarration) {
    var summaryInsert = '\n### 결과 요약 팝업 내용\n\n';
    if (state.summaryTitle) summaryInsert += '- **제목**: ' + state.summaryTitle + '\n';
    if (state.summaryBody) summaryInsert += '- **본문**: ' + state.summaryBody + '\n';
    if (state.summaryConceptBox) summaryInsert += '- **핵심 개념 박스**: ' + state.summaryConceptBox + '\n';
    if (state.summaryNarration) summaryInsert += '- **정리 나레이션**: ' + state.summaryNarration + '\n';
    summaryInsert += '\n';
    md2 = md2.replace('## 5. 결과 요약 연결', '## 5. 결과 요약 연결' + summaryInsert);
  }

  return { md1: md1, md2: md2 };
}


/* ═══════════════════════════════════════
   유틸리티 함수
   ═══════════════════════════════════════ */

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function field(label, type, key, placeholder, hint) {
  var h = '<div><div class="lb">' + label + '</div>';
  if (type === 'input') {
    h += '<input class="fi" value="' + esc(state[key]) + '" onchange="updateState(\'' + key + '\',this.value)" placeholder="' + esc(placeholder) + '">';
  } else {
    h += '<textarea class="fi" onchange="updateState(\'' + key + '\',this.value)" placeholder="' + esc(placeholder) + '" rows="3">' + esc(state[key]) + '</textarea>';
  }
  if (hint) h += '<div class="hint">' + hint + '</div>';
  h += '</div>';
  return h;
}

function stepField(label, idx, key, placeholder) {
  var s = state.steps[idx];
  return '<div><div class="lb">' + label + '</div><textarea class="fi" onchange="updateStep(' + idx + ',\'' + key + '\',this.value)" placeholder="' + esc(placeholder) + '" rows="2">' + esc(s[key]) + '</textarea></div>';
}


/* ═══════════════════════════════════════
   이벤트 핸들러 (글로벌)
   ═══════════════════════════════════════ */

function switchTab(n) { state.activeTab = n; render(); }
function updateState(key, val) { state[key] = val; }

// 장비 — 레퍼런스 체크리스트
function toggleRef(id) {
  state.refChecks[id] = !state.refChecks[id];
  render();
}
// 장비 — 커스텀 장비
function addCustomEquip() { state.customEquips.push(newEquip()); render(); }
function removeCustomEquip(i) { state.customEquips.splice(i, 1); render(); }
function updateCustomEquip(i, field, val) { state.customEquips[i][field] = val; }

// 단계
function addStep() { state.steps.push(newStep()); render(); }
function removeStep(i) { if (state.steps.length <= 1) return; state.steps.splice(i, 1); render(); }
function moveStep(i, dir) {
  var ni = i + dir;
  if (ni < 0 || ni >= state.steps.length) return;
  var tmp = state.steps[i]; state.steps[i] = state.steps[ni]; state.steps[ni] = tmp;
  render();
}
function updateStep(i, field, val) { state.steps[i][field] = val; }

// 시뮬레이션 템플릿
function toggleTemplate(id) {
  state.openTemplates[id] = !state.openTemplates[id];
  render();
}
function selectTemplate(id) {
  state.simUseTemplate = (state.simUseTemplate === id) ? '' : id;
  render();
}

// 복사
function copyMd(which) {
  var result = generateMarkdown();
  var text = which === 1 ? result.md1 : result.md2;
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.getElementById('copy' + which + '-btn');
    if (btn) {
      btn.textContent = '✅ 복사됨!';
      btn.style.background = '#55efc4';
      btn.style.color = '#1a5276';
      setTimeout(function() {
        btn.textContent = which === 1 ? '📋 지시서 1/2 복사' : '📋 지시서 2/2 복사';
        btn.style.background = '';
        btn.style.color = '';
      }, 2000);
    }
  });
}

// 다운로드
function downloadMd(which) {
  var result = generateMarkdown();
  var text = which === 1 ? result.md1 : result.md2;
  var filename = which === 1 ? '가상실험실_제작_지시서_1of2.md' : '가상실험실_제작_지시서_2of2.md';
  var blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}


/* ── 초기 렌더링 ── */
render();
</script>
